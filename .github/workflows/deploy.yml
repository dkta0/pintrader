name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger infra pintrader deploy
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.INFRA_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/dkta0/infra/actions/workflows/deploy-pintrader.yml/dispatches \
            -d '{"ref":"main","inputs":{"ref":"${{ github.sha }}"}}'
